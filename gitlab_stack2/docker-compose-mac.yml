version: '3'
services:
  gitlab:
    image: gitlab/gitlab-ce:latest  # 使用官方 GitLab CE 镜像
    platform: linux/amd64  # 明确指定镜像架构为 x86_64
    restart: always
    hostname: 'localhost'  # 使用本地主机
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        # 修正 1：这里的端口必须改为 9080，否则页面样式会丢失或无法访问
        external_url 'http://localhost:9080'  # 设置 GitLab 的本机访问地址
        gitlab_rails['initial_root_password'] = 'y6040145'  # 初始 root 密码
        # 建议增加：告知界面 SSH 端口已改为 822
        gitlab_rails['gitlab_shell_ssh_port'] = 822
    ports:
      - "80:80"     # HTTP 端口
      - "8443:443"   # HTTPS 端口
      - "822:22"     # SSH 端口
    # 修正 2：必须把下面的命名卷挂载给容器，否则数据会在重启后丢失
    volumes:
      - gitlab_config:/etc/gitlab   # 配置文件持久化
      - gitlab_logs:/var/log/gitlab # 日志文件持久化
      - gitlab_data:/var/opt/gitlab # 数据持久化

# 修正 3：这里定义的卷只是声明，必须在上面的 services 中引用才会生效
volumes:
  gitlab_config:
  gitlab_logs:
  gitlab_data: