version: '3'
services:
  gitlab:
    image: imachineml/gitlab-ce:latest  # 使用官方 GitLab CE 镜像
    platform: linux/amd64  # 明确指定镜像架构为 x86_64
    container_name: gitlab-code
    restart: always
    hostname: 'localhost'  # 使用本地主机
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost'  # 设置 GitLab 的本机访问地址
        gitlab_rails['initial_root_password'] = 'y6040145'  # 初始 root 密码
    ports:
      - "880:80"     # HTTP 端口
      - "8443:443"   # HTTPS 端口
      - "822:22"     # SSH 端口
    volumes:
    # 将数据持久化到 D 盘的特定文件夹
    - 'D:/gitlab/config:/etc/gitlab'
    - 'D:/gitlab/logs:/var/log/gitlab'
    - 'D:/gitlab/data:/var/opt/gitlab'

volumes:
  gitlab_config:
  gitlab_logs:
  gitlab_data: